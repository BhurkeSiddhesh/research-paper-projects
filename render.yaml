services:
  # ── Backend: FastAPI simulation server ──────────────────────────────────────
  - type: web
    name: invagent-backend
    runtime: python
    rootDir: invagent/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Frontend: static dashboard ──────────────────────────────────────────────
  - type: web
    name: invagent-frontend
    runtime: static
    rootDir: invagent/frontend
    buildCommand: |
      echo "window.API_BASE_URL = '${BACKEND_URL}';" > api_config.js
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    envVars:
      - key: BACKEND_URL
        fromService:
          name: invagent-backend
          type: web
          property: host
          transform: "https://{value}"
